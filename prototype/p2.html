<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RhizoDoc 原型 - Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <style>
        :root {
            /* MD3 Color Palette */
            --md-sys-color-background: #FBFDF8;
            --md-sys-color-on-background: #191C19;
            --md-sys-color-surface: #F8FAF5;
            --md-sys-color-surface-container-lowest: #FFFFFF;
            --md-sys-color-surface-container-low: #F3F5EF;
            --md-sys-color-surface-container: #EAEFE7;
            --md-sys-color-surface-container-high: #E0E5DD;
            --md-sys-color-on-surface: #191C19;
            --md-sys-color-on-surface-variant: #43483E;
            --md-sys-color-primary-container: #D7E2FF;
            --md-sys-color-on-primary-container: #001A41;
            --md-sys-color-primary: #0061A4;
            --md-sys-color-secondary-container: #C3E7FF;
            --md-sys-color-on-secondary-container: #001D35;
            --md-sys-color-success-container: #B8F397;
            --md-sys-color-on-success-container: #042100;
            --md-sys-color-error: #BA1A1A;
            --md-sys-color-outline: #73777F;
            --md-sys-color-outline-variant: #C3C7CF;
            
            --md-sys-elevation-1: 0px 1px 2px 0px rgba(0,0,0,0.3), 0px 1px 3px 1px rgba(0,0,0,0.15);
            --md-sys-elevation-2: 0px 1px 2px 0px rgba(0,0,0,0.3), 0px 2px 6px 2px rgba(0,0,0,0.15);
            --md-sys-elevation-3: 0px 1px 3px 0px rgba(0,0,0,0.3), 0px 4px 8px 3px rgba(0,0,0,0.15);

            --hl-0-bg: #FFD9E2; --hl-0-fg: #3E001D;
            --hl-1-bg: #C3E7FF; --hl-1-fg: #001D35;
            --hl-2-bg: #C4ECCB; --hl-2-fg: #00210E;
            --hl-3-bg: #FFDEA2; --hl-3-fg: #291800;
            --hl-4-bg: #F0DBFF; --hl-4-fg: #2B0053;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Roboto', sans-serif; background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background); user-select: none; 
        }

        /* 顶部导航栏 (还原截图设计) */
        #top-app-bar {
            position: fixed; top: 16px; left: 16px; right: 16px; height: 64px;
            background-color: var(--md-sys-color-surface-container-lowest);
            border-radius: 32px; box-shadow: var(--md-sys-elevation-1);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px 0 24px; z-index: 1000;
            border: 1px solid var(--md-sys-color-surface-container-high);
        }

        .top-bar-left { display: flex; align-items: center; gap: 16px; }
        .top-bar-logo { color: var(--md-sys-color-primary); font-size: 28px; }
        .top-bar-title-group { display: flex; flex-direction: column; }
        .top-bar-title { font-weight: 600; font-size: 16px; color: var(--md-sys-color-on-surface); }
        .top-bar-subtitle { font-size: 12px; color: var(--md-sys-color-on-surface-variant); }

        .top-bar-center { display: flex; align-items: center; }
        .status-chip {
            background-color: var(--md-sys-color-success-container); color: var(--md-sys-color-on-success-container);
            padding: 6px 16px; border-radius: 16px; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 6px;
        }

        .top-bar-right { display: flex; align-items: center; gap: 8px; }
        .top-btn {
            display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px;
            border: none; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer;
            color: var(--md-sys-color-on-surface); background: transparent; transition: all 0.2s;
        }
        .top-btn:hover { background-color: var(--md-sys-color-surface-container-high); }
        .top-btn.filled { background-color: var(--md-sys-color-surface-container); }
        .top-btn.filled:hover { background-color: var(--md-sys-color-surface-container-high); }
        .top-btn .material-symbols-outlined { font-size: 20px; }

        /* 画布 */
        #viewport {
            width: 100vw; height: 100vh; position: relative; cursor: grab;
            background-image: radial-gradient(var(--md-sys-color-outline-variant) 1px, transparent 0);
            background-size: 40px 40px; background-position: 0 0;
            padding-top: 80px; /* 避开顶部栏 */
        }
        #viewport:active { cursor: grabbing; }
        #canvas { position: absolute; transform-origin: 0 0; }
        #edges-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
        path.edge { fill: none; stroke: var(--md-sys-color-outline); stroke-width: 3px; stroke-linecap: round; transition: d 0.1s; }

        /* 节点设计优化 */
        .node {
            position: absolute; width: 360px; min-width: 280px; max-width: 800px; min-height: 120px;
            background-color: var(--md-sys-color-surface-container-lowest);
            border-radius: 24px; padding: 20px 20px 16px 20px;
            box-shadow: var(--md-sys-elevation-1);
            border: 1px solid var(--md-sys-color-surface-container-high);
            transition: box-shadow 0.2s ease, width 0s; /* 拖拽时不需要过渡 */
            display: flex; flex-direction: column;
        }
        .node:hover { box-shadow: var(--md-sys-elevation-3); z-index: 10; }
        .node.loading { opacity: 0.8; pointer-events: none; border: 1px dashed var(--md-sys-color-primary); }
        
        /* 动态高亮边框指示器 */
        .node::before {
            content: ''; position: absolute; top: 24px; bottom: 24px; width: 6px; border-radius: 3px;
            background-color: var(--node-color, var(--md-sys-color-surface-container-high));
            transition: all 0.3s;
        }
        .node[data-dir="right"]::before { left: 8px; right: auto; }
        .node[data-dir="left"]::before { right: 8px; left: auto; }

        .node-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
            cursor: grab; padding-bottom: 8px; border-bottom: 1px solid var(--md-sys-color-surface-container);
        }
        .node-header:active { cursor: grabbing; }
        
        .node-title-group { display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--md-sys-color-primary); font-size: 16px; }
        
        .node-actions { display: flex; align-items: center; gap: 4px; cursor: default; }
        .node-btn { 
            width: 28px; height: 28px; border-radius: 50%; border: none; background: transparent; 
            color: var(--md-sys-color-on-surface-variant); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .node-btn:hover { background-color: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface); }
        .node-btn.resize-handle { cursor: ew-resize; color: var(--md-sys-color-outline); }
        .node-btn .material-symbols-outlined { font-size: 18px; pointer-events: none; }

        .node-content-wrapper { position: relative; width: 100%; flex-grow: 1; }
        .node-content {
            font-size: 15px; line-height: 1.6; color: var(--md-sys-color-on-surface);
            white-space: pre-wrap; cursor: text; user-select: text;
            max-height: 200px; overflow: hidden; /* 默认折叠高度 */
            transition: max-height 0.3s ease;
        }
        
        /* 折叠状态的渐变遮罩 */
        .node.collapsed .node-content-mask {
            position: absolute; bottom: 0; left: 0; right: 0; height: 60px; pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, var(--md-sys-color-surface-container-lowest) 100%);
        }
        
        .expand-btn {
            display: none; width: 100%; text-align: center; margin-top: 8px;
            background: transparent; border: none; color: var(--md-sys-color-primary);
            font-size: 13px; font-weight: 500; cursor: pointer; align-items: center; justify-content: center; gap: 4px;
        }
        .expand-btn:hover { text-decoration: underline; }
        .node.collapsed .expand-btn.visible { display: flex; }
        
        .node.expanded .node-content { max-height: none; }
        .node.expanded .node-content-mask { display: none; }
        .node.expanded .btn-collapse { display: flex; } /* 展开状态才显示顶部收起按钮 */
        .node.collapsed .btn-collapse { display: none; }

        mark.annotated { border-radius: 4px; padding: 2px 4px; box-decoration-break: clone; cursor: pointer; }

        /* 全屏模态框 */
        #fullscreen-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(25, 28, 25, 0.3); backdrop-filter: blur(4px);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s;
        }
        #fullscreen-overlay.active { display: flex; opacity: 1; }
        .fullscreen-container {
            width: 80vw; max-width: 900px; height: 85vh;
            background: var(--md-sys-color-surface-container-lowest);
            border-radius: 28px; display: flex; flex-direction: column;
            box-shadow: var(--md-sys-elevation-3); overflow: hidden;
            transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        #fullscreen-overlay.active .fullscreen-container { transform: scale(1); }
        .fs-header { padding: 20px 24px; border-bottom: 1px solid var(--md-sys-color-surface-container); display: flex; justify-content: space-between; align-items: center; background: var(--md-sys-color-surface); }
        .fs-title { font-size: 20px; font-weight: 600; color: var(--md-sys-color-primary); display: flex; align-items: center; gap: 8px;}
        .fs-content { padding: 32px 40px; overflow-y: auto; flex-grow: 1; font-size: 16px; line-height: 1.8; user-select: text; cursor: text; }

        /* 批注工具栏 */
        #action-tooltip {
            position: fixed; display: none; align-items: center;
            background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);
            border-radius: 24px; font-size: 14px; box-shadow: var(--md-sys-elevation-3);
            z-index: 3000; transform: translate(-50%, -120%); overflow: hidden;
        }
        .tooltip-view { display: flex; align-items: center; padding: 10px 20px; gap: 8px; cursor: pointer; font-weight: 500;}
        .tooltip-view:hover { background-color: var(--md-sys-color-secondary-container); }
        .input-view { display: none; align-items: center; padding: 4px 8px; gap: 4px; }
        .input-view input { border: none; outline: none; background: var(--md-sys-color-surface-container-lowest); font-family: inherit; font-size: 14px; width: 200px; border-radius: 16px; padding: 8px 12px; }
        .icon-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--md-sys-color-on-primary-container); border-radius: 50%; width: 32px; height: 32px; }
        .icon-btn:hover { background-color: rgba(0,0,0,0.08); }
        #action-tooltip:hover .tooltip-view, #action-tooltip.focus .tooltip-view { display: none; }
        #action-tooltip:hover .input-view, #action-tooltip.focus .input-view { display: flex; }

        /* 进度提示队列 (左下角) */
        #toast-container {
            position: fixed; bottom: 24px; left: 24px; z-index: 1500;
            display: flex; flex-direction: column-reverse; gap: 12px; pointer-events: none;
        }
        .toast-card {
            background: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface);
            padding: 12px 20px; border-radius: 16px; box-shadow: var(--md-sys-elevation-2);
            display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500;
            animation: slideIn 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        .toast-card .spinner { font-size: 18px; color: var(--md-sys-color-primary); animation: spin 1s linear infinite; }
        .toast-card.done .spinner { display: none; }
        .toast-card.done .icon-done { display: block; color: var(--md-sys-color-success-container); font-size: 20px; }
        .icon-done { display: none; }

        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 右下角工具栏 & 小地图 */
        #toolbar { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; gap: 12px; align-items: flex-end; }
        .toolbar-group { display: flex; flex-direction: column; background: var(--md-sys-color-surface-container-lowest); border-radius: 16px; overflow: hidden; box-shadow: var(--md-sys-elevation-1); border: 1px solid var(--md-sys-color-surface-container-high); }
        .toolbar-btn { width: 40px; height: 40px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--md-sys-color-on-surface-variant); transition: background 0.2s; }
        .toolbar-btn:hover { background-color: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface); }
        #minimap { width: 160px; height: 120px; background: var(--md-sys-color-surface-container-low); border-radius: 16px; box-shadow: var(--md-sys-elevation-1); position: relative; overflow: hidden; cursor: crosshair; border: 1px solid var(--md-sys-color-surface-container-high); }
        .minimap-node { position: absolute; background: var(--md-sys-color-primary); border-radius: 2px; opacity: 0.4; }
        #minimap-viewport { position: absolute; border: 2px solid var(--md-sys-color-primary); background: rgba(0,97,164,0.1); border-radius: 4px; pointer-events: none; }

        /* 右键菜单 */
        .context-menu {
            position: fixed; display: none; background: var(--md-sys-color-surface-container-lowest);
            border-radius: 12px; box-shadow: var(--md-sys-elevation-3); z-index: 4000;
            padding: 8px 0; min-width: 180px; flex-direction: column; border: 1px solid var(--md-sys-color-surface-container-high);
        }
        .menu-item { padding: 10px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; color: var(--md-sys-color-on-surface); }
        .menu-item:hover { background-color: var(--md-sys-color-surface-container-high); }
        .menu-item .material-symbols-outlined { font-size: 20px; color: var(--md-sys-color-on-surface-variant); }
        .menu-item.danger { color: var(--md-sys-color-error); }
        .menu-item.danger .material-symbols-outlined { color: var(--md-sys-color-error); }
        .menu-divider { height: 1px; background: var(--md-sys-color-surface-container); margin: 4px 0; }

        ::selection { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
    </style>
</head>
<body>

    <!-- 顶部栏 -->
    <div id="top-app-bar">
        <div class="top-bar-left">
            <span class="material-symbols-outlined top-bar-logo">account_tree</span>
            <div class="top-bar-title-group">
                <div class="top-bar-title">RhizoDoc</div>
                <div class="top-bar-subtitle">核心文档</div>
            </div>
        </div>
        <div class="top-bar-center">
            <div class="status-chip">
                <span class="material-symbols-outlined" style="font-size:16px;">check_circle</span>
                API 已配置 · Gemini-3.5-flash
            </div>
        </div>
        <div class="top-bar-right">
            <button class="top-btn"><span class="material-symbols-outlined">add_box</span> 新文档</button>
            <button class="top-btn"><span class="material-symbols-outlined">folder_open</span> 打开文档</button>
            <button class="top-btn filled"><span class="material-symbols-outlined">download</span> 保存流程图</button>
            <button class="top-btn filled"><span class="material-symbols-outlined">upload</span> 加载流程图</button>
            <button class="top-btn"><span class="material-symbols-outlined">cloud_upload</span> 存到服务端</button>
        </div>
    </div>

    <!-- 左下角状态队列 -->
    <div id="toast-container"></div>

    <!-- 全屏模态框 -->
    <div id="fullscreen-overlay">
        <div class="fullscreen-container">
            <div class="fs-header">
                <div class="fs-title" id="fs-title"><span class="material-symbols-outlined">description</span>节点全屏浏览</div>
                <button class="icon-btn" onclick="closeFullscreen()" style="background:var(--md-sys-color-surface-container);"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="fs-content" id="fs-content"></div>
        </div>
    </div>

    <div id="action-tooltip">
        <div class="tooltip-view"><span class="material-symbols-outlined icon">auto_awesome</span><span class="text">批注并生成</span></div>
        <div class="input-view">
            <input type="text" id="ai-prompt" placeholder="输入你想扩展的内容...">
            <button class="icon-btn" id="btn-confirm"><span class="material-symbols-outlined">send</span></button>
            <button class="icon-btn" id="btn-cancel" style="color:var(--md-sys-color-error);"><span class="material-symbols-outlined">close</span></button>
        </div>
    </div>

    <div id="node-context-menu" class="context-menu">
        <div class="menu-item" id="menu-fs"><span class="material-symbols-outlined">fullscreen</span> 全屏查看</div>
        <div class="menu-item" id="menu-toggle"><span class="material-symbols-outlined">unfold_more</span> 展开/折叠</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="menu-regen"><span class="material-symbols-outlined">refresh</span> 重新生成</div>
        <div class="menu-item danger" id="menu-delete"><span class="material-symbols-outlined">delete</span> 删除节点</div>
    </div>

    <div id="canvas-context-menu" class="context-menu">
        <div class="menu-item" id="menu-zoom-in"><span class="material-symbols-outlined">zoom_in</span> 放大画布</div>
        <div class="menu-item" id="menu-zoom-out"><span class="material-symbols-outlined">zoom_out</span> 缩小画布</div>
        <div class="menu-item" id="menu-zoom-fit"><span class="material-symbols-outlined">fit_screen</span> 适应屏幕</div>
    </div>

    <div id="viewport">
        <div id="canvas">
            <svg id="edges-layer"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <div id="toolbar">
        <div id="minimap"><div id="minimap-content"></div><div id="minimap-viewport"></div></div>
        <div class="toolbar-group"><button class="toolbar-btn" onclick="triggerCenter()" title="居中"><span class="material-symbols-outlined">filter_center_focus</span></button></div>
        <div class="toolbar-group">
            <button class="toolbar-btn" onclick="zoom(0.2, window.innerWidth/2, window.innerHeight/2)"><span class="material-symbols-outlined">add</span></button>
            <button class="toolbar-btn" onclick="zoomFit()"><span class="material-symbols-outlined">fit_screen</span></button>
            <button class="toolbar-btn" onclick="zoom(-0.2, window.innerWidth/2, window.innerHeight/2)"><span class="material-symbols-outlined">remove</span></button>
        </div>
    </div>

<script>
    const state = {
        canvas: { x: 0, y: 0, scale: 1 },
        isDragging: false, dragStart: { x: 0, y: 0 },
        isDraggingNode: false, draggedNodeId: null, nodeDragOffset: { x: 0, y: 0 },
        isResizing: false, resizeNodeId: null, startWidth: 0, startX: 0,
        nodes: [], edges: [],
        currentSelection: { text: '', parentNodeId: null, range: null },
        contextNodeId: null,
        colorIndex: 0, toastIdCount: 0
    };

    const DOM = {
        viewport: document.getElementById('viewport'), canvas: document.getElementById('canvas'),
        nodesLayer: document.getElementById('nodes-layer'), edgesLayer: document.getElementById('edges-layer'),
        tooltip: document.getElementById('action-tooltip'), promptInput: document.getElementById('ai-prompt'),
        nodeMenu: document.getElementById('node-context-menu'), canvasMenu: document.getElementById('canvas-context-menu'),
        fsOverlay: document.getElementById('fullscreen-overlay'), fsTitle: document.getElementById('fs-title'), fsContent: document.getElementById('fs-content'),
        toastContainer: document.getElementById('toast-container')
    };

    const INIT_TEXT = `选择这段文字进行批注生成。\n\n本原型升级点：\n1. 节点过长会自动折叠隐藏，底部有展开按钮。\n2. 节点右上角有【全屏】【折叠】【调整宽度】三个按钮。\n3. 按住右上角 6个点图标 可以拖拽改变节点宽度。\n4. 智能排版：选中文字生成时，AI 会判断左边还是右边空旷，自动将节点放在空旷的一侧，并自动改变连线方向和卡片颜色条指示方向！\n5. 全屏模式下，依然可以选中文本进行连续发散批注（不需关闭全屏）。\n6. 左下角加入了生成进度 Toast 队列展示。\n\n请多选几处文字体验布局和颜色变化！这是为了填补高度故意写的很长很长的文本测试折叠效果。继续填充。继续填充。继续填充。继续填充。继续填充。继续填充。继续填充。继续填充。继续填充。继续填充。继续填充。继续填充。`;

    function init() {
        state.canvas.x = window.innerWidth / 2 - 200; state.canvas.y = 150;
        updateCanvasTransform();
        addNode({
            id: 'node-root', title: '核心文档', colorIndex: -1,
            content: INIT_TEXT, x: 0, y: 0, width: 400, parentId: null, dir: 'right'
        });
        setupEvents();
        setupDefs();
    }

    function setupDefs() {
        // 设置双向箭头
        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `
            <marker id="arrow-right" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--md-sys-color-outline)"/></marker>
        `;
        DOM.edgesLayer.appendChild(defs);
    }

    function updateCanvasTransform() {
        DOM.canvas.style.transform = `translate(${state.canvas.x}px, ${state.canvas.y}px) scale(${state.canvas.scale})`;
        DOM.viewport.style.backgroundPosition = `${state.canvas.x}px ${state.canvas.y}px`;
        DOM.viewport.style.backgroundSize = `${40 * state.canvas.scale}px ${40 * state.canvas.scale}px`;
        updateMinimap();
    }

    function setupEvents() {
        // 拖拽画布
        DOM.viewport.addEventListener('mousedown', (e) => {
            if(e.button !== 0) return;
            if (e.target.closest('.node') || e.target.closest('#action-tooltip') || e.target.closest('#top-app-bar') || e.target.closest('#toolbar')) return;
            state.isDragging = true;
            state.dragStart = { x: e.clientX - state.canvas.x, y: e.clientY - state.canvas.y };
            hideTooltip(); hideMenus();
        });

        // 节点操作 (拖动/调整大小)
        DOM.nodesLayer.addEventListener('mousedown', (e) => {
            if(e.button !== 0) return;
            hideTooltip(); hideMenus();
            
            const resizeHandle = e.target.closest('.resize-handle');
            const header = e.target.closest('.node-header');
            const nodeEl = e.target.closest('.node');
            
            if (resizeHandle) {
                e.stopPropagation(); e.preventDefault();
                state.isResizing = true; state.resizeNodeId = nodeEl.id;
                state.startWidth = nodeEl.offsetWidth; state.startX = e.clientX;
            } else if (header && !e.target.closest('.node-btn')) {
                state.isDraggingNode = true; state.draggedNodeId = nodeEl.id;
                const rect = nodeEl.getBoundingClientRect();
                state.nodeDragOffset = { x: (e.clientX - rect.left) / state.canvas.scale, y: (e.clientY - rect.top) / state.canvas.scale };
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (state.isDragging) {
                state.canvas.x = e.clientX - state.dragStart.x; state.canvas.y = e.clientY - state.dragStart.y;
                updateCanvasTransform();
            } else if (state.isDraggingNode) {
                const nodeEl = document.getElementById(state.draggedNodeId);
                const newX = (e.clientX - state.canvas.x) / state.canvas.scale - state.nodeDragOffset.x;
                const newY = (e.clientY - state.canvas.y) / state.canvas.scale - state.nodeDragOffset.y;
                nodeEl.style.left = `${newX}px`; nodeEl.style.top = `${newY}px`;
                const nData = state.nodes.find(n => n.id === state.draggedNodeId);
                nData.x = newX; nData.y = newY;
                drawEdges(); updateMinimap();
            } else if (state.isResizing) {
                const nodeEl = document.getElementById(state.resizeNodeId);
                let newWidth = state.startWidth + (e.clientX - state.startX) / state.canvas.scale;
                newWidth = Math.max(280, Math.min(newWidth, 800)); // 限制宽度范围
                nodeEl.style.width = `${newWidth}px`;
                state.nodes.find(n => n.id === state.resizeNodeId).width = newWidth;
                checkNodeExpansion(nodeEl); drawEdges();
            }
        });

        window.addEventListener('mouseup', () => { state.isDragging = false; state.isDraggingNode = false; state.isResizing = false; });
        DOM.viewport.addEventListener('wheel', (e) => {
            if (e.target.closest('.node-content') || e.target.closest('#toolbar') || e.target.closest('#top-app-bar')) return; 
            e.preventDefault(); zoom(-e.deltaY * 0.001, e.clientX, e.clientY);
        }, { passive: false });

        document.addEventListener('selectionchange', handleSelection);
        document.addEventListener('mousedown', (e) => {
            if (!e.target.closest('#action-tooltip') && !e.target.closest('.node') && !e.target.closest('.fullscreen-container')) hideTooltip();
            if (!e.target.closest('.context-menu')) hideMenus();
        });

        DOM.promptInput.addEventListener('focus', () => DOM.tooltip.classList.add('focus'));
        DOM.promptInput.addEventListener('blur', () => DOM.tooltip.classList.remove('focus'));
        DOM.promptInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') triggerLLM(); if (e.key === 'Escape') hideTooltip(); });
        document.getElementById('btn-confirm').onclick = triggerLLM;
        document.getElementById('btn-cancel').onclick = hideTooltip;

        // 右键菜单
        DOM.viewport.addEventListener('contextmenu', (e) => {
            e.preventDefault(); const nodeEl = e.target.closest('.node'); hideTooltip();
            if(nodeEl) {
                state.contextNodeId = nodeEl.id;
                DOM.canvasMenu.style.display = 'none'; DOM.nodeMenu.style.display = 'flex';
                DOM.nodeMenu.style.left = `${e.clientX}px`; DOM.nodeMenu.style.top = `${e.clientY}px`;
            } else {
                DOM.nodeMenu.style.display = 'none'; DOM.canvasMenu.style.display = 'flex';
                DOM.canvasMenu.style.left = `${e.clientX}px`; DOM.canvasMenu.style.top = `${e.clientY}px`;
            }
        });

        document.getElementById('menu-fs').onclick = () => { hideMenus(); openFullscreen(state.contextNodeId); };
        document.getElementById('menu-toggle').onclick = () => { hideMenus(); toggleNodeExpand(state.contextNodeId); };
        document.getElementById('menu-regen').onclick = () => { hideMenus(); /* mock */ };
        document.getElementById('menu-delete').onclick = () => { hideMenus(); deleteNode(state.contextNodeId); };
        
        document.getElementById('menu-zoom-in').onclick = () => { hideMenus(); zoom(0.2, window.innerWidth/2, window.innerHeight/2); };
        document.getElementById('menu-zoom-out').onclick = () => { hideMenus(); zoom(-0.2, window.innerWidth/2, window.innerHeight/2); };
        document.getElementById('menu-zoom-fit').onclick = () => { hideMenus(); zoomFit(); };
    }

    /* 缩放逻辑 */
    function zoom(delta, mouseX, mouseY) {
        const newScale = Math.min(Math.max(0.15, state.canvas.scale + delta), 3);
        const rect = DOM.viewport.getBoundingClientRect();
        const mx = mouseX - rect.left; const my = mouseY - rect.top;
        state.canvas.x = mx - (mx - state.canvas.x) * (newScale / state.canvas.scale);
        state.canvas.y = my - (my - state.canvas.y) * (newScale / state.canvas.scale);
        state.canvas.scale = newScale; updateCanvasTransform(); hideTooltip();
    }
    function zoomFit() {
        if(state.nodes.length === 0) return;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        state.nodes.forEach(n => { minX = Math.min(minX, n.x); minY = Math.min(minY, n.y); maxX = Math.max(maxX, n.x + n.width); maxY = Math.max(maxY, n.y + 200); });
        const padding = 100;
        const scale = Math.min(window.innerWidth / (maxX - minX + padding*2), window.innerHeight / (maxY - minY + padding*2), 1.2);
        state.canvas.scale = scale; state.canvas.x = window.innerWidth / 2 - ((minX + maxX) / 2) * scale; state.canvas.y = window.innerHeight / 2 - ((minY + maxY) / 2) * scale + 40;
        updateCanvasTransform();
    }
    function triggerCenter() { state.canvas.x = window.innerWidth / 2 - 200; state.canvas.y = window.innerHeight / 2 - 150; updateCanvasTransform(); }

    /* 全屏逻辑 */
    function openFullscreen(id) {
        const node = state.nodes.find(n => n.id === id); if(!node) return;
        DOM.fsTitle.innerHTML = `<span class="material-symbols-outlined">description</span>${node.title}`;
        // 将 HTML 内容复制进模态框，包含 mark 高亮
        const nodeDOM = document.getElementById(id);
        DOM.fsContent.innerHTML = nodeDOM.querySelector('.node-content').innerHTML;
        // 传递当前节点 ID，用于批注回溯
        DOM.fsContent.setAttribute('data-source-id', id);
        DOM.fsOverlay.classList.add('active');
    }
    function closeFullscreen() { DOM.fsOverlay.classList.remove('active'); hideTooltip(); window.getSelection().removeAllRanges(); }

    /* 文本选取与批注触发 */
    function handleSelection() {
        const selection = window.getSelection();
        if (selection.toString().trim().length > 0) {
            let nodeEl = selection.anchorNode.parentElement.closest('.node');
            let fsEl = selection.anchorNode.parentElement.closest('.fs-content');
            
            let parentNodeId = null;
            if(fsEl) parentNodeId = fsEl.getAttribute('data-source-id');
            else if(nodeEl) parentNodeId = nodeEl.id;

            if (parentNodeId) {
                const range = selection.getRangeAt(0); const rect = range.getBoundingClientRect();
                state.currentSelection = { text: selection.toString(), parentNodeId: parentNodeId, range: range };
                DOM.tooltip.style.display = 'flex'; 
                DOM.tooltip.style.left = `${rect.left + rect.width / 2}px`; 
                DOM.tooltip.style.top = `${Math.max(80, rect.top - 15)}px`; // 避开顶部栏
                DOM.promptInput.value = ''; DOM.promptInput.focus();
            }
        } else if(!DOM.tooltip.classList.contains('focus')) hideTooltip();
    }
    function hideTooltip() { DOM.tooltip.style.display = 'none'; DOM.tooltip.classList.remove('focus'); }
    function hideMenus() { DOM.nodeMenu.style.display = 'none'; DOM.canvasMenu.style.display = 'none'; }

    /* 节点管理 */
    function addNode(nodeData) {
        state.nodes.push(nodeData);
        const nodeEl = document.createElement('div');
        nodeEl.className = 'node collapsed'; nodeEl.id = nodeData.id;
        nodeEl.style.left = `${nodeData.x}px`; nodeEl.style.top = `${nodeData.y}px`;
        nodeEl.style.width = `${nodeData.width}px`;
        nodeEl.setAttribute('data-dir', nodeData.dir || 'right');
        
        let colorStyle = '';
        if (nodeData.colorIndex >= 0) colorStyle = `--node-color: var(--hl-${nodeData.colorIndex}-bg);`;
        nodeEl.style.cssText += colorStyle;

        nodeEl.innerHTML = `
            <div class="node-header">
                <div class="node-title-group"><span class="material-symbols-outlined">notes</span>${nodeData.title}</div>
                <div class="node-actions">
                    <button class="node-btn" title="全屏查看" onclick="openFullscreen('${nodeData.id}')"><span class="material-symbols-outlined">fullscreen</span></button>
                    <button class="node-btn btn-collapse" title="收起内容" onclick="toggleNodeExpand('${nodeData.id}')"><span class="material-symbols-outlined">unfold_less</span></button>
                    <button class="node-btn resize-handle" title="调整宽度"><span class="material-symbols-outlined">drag_indicator</span></button>
                </div>
            </div>
            <div class="node-content-wrapper">
                <div class="node-content">${nodeData.content}</div>
                <div class="node-content-mask"></div>
            </div>
            <button class="expand-btn" onclick="toggleNodeExpand('${nodeData.id}')">展开全部 <span class="material-symbols-outlined" style="font-size:16px;">keyboard_arrow_down</span></button>
        `;
        DOM.nodesLayer.appendChild(nodeEl);
        if (nodeData.parentId) addEdge(nodeData.parentId, nodeData.id);
        
        // 渲染后检查是否需要显示展开按钮
        setTimeout(() => { checkNodeExpansion(nodeEl); drawEdges(); }, 0);
        updateMinimap();
    }

    function checkNodeExpansion(nodeEl) {
        const content = nodeEl.querySelector('.node-content');
        const expandBtn = nodeEl.querySelector('.expand-btn');
        if(content.scrollHeight > content.clientHeight + 5) expandBtn.classList.add('visible');
        else expandBtn.classList.remove('visible');
    }

    function toggleNodeExpand(id) {
        const el = document.getElementById(id); if(!el) return;
        el.classList.toggle('collapsed'); el.classList.toggle('expanded');
        setTimeout(() => { drawEdges(); }, 300); // 配合动画重绘连线
    }

    function deleteNode(id) {
        if(id === 'node-root') return;
        const el = document.getElementById(id); if(el) el.remove();
        const marks = document.querySelectorAll(`mark[data-ref-id="${id}"]`);
        marks.forEach(m => { const p = m.parentNode; while(m.firstChild) p.insertBefore(m.firstChild, m); p.removeChild(m); });
        state.nodes = state.nodes.filter(n => n.id !== id);
        state.edges = state.edges.filter(e => e.sourceId !== id && e.targetId !== id);
        drawEdges(); updateMinimap();
    }

    function addEdge(sourceId, targetId) { state.edges.push({ sourceId, targetId }); }

    /* 智能连线路由 */
    function drawEdges() {
        // 清理保留 defs
        const defs = DOM.edgesLayer.querySelector('defs');
        DOM.edgesLayer.innerHTML = '';
        if(defs) DOM.edgesLayer.appendChild(defs);

        DOM.edgesLayer.style.width = '10000px'; DOM.edgesLayer.style.height = '10000px';
        DOM.edgesLayer.style.transform = 'translate(-5000px, -5000px)'; const offset = 5000;

        state.edges.forEach((edge) => {
            const sourceEl = document.getElementById(edge.sourceId); const targetEl = document.getElementById(edge.targetId);
            if (sourceEl && targetEl) {
                const sRect = { x: parseFloat(sourceEl.style.left) + offset, y: parseFloat(sourceEl.style.top) + offset, w: sourceEl.offsetWidth, h: sourceEl.offsetHeight };
                const tRect = { x: parseFloat(targetEl.style.left) + offset, y: parseFloat(targetEl.style.top) + offset, w: targetEl.offsetWidth, h: targetEl.offsetHeight };
                
                let sX, sY, tX, tY, cp1X, cp1Y, cp2X, cp2Y;
                const headOffset = 24; // 从 header 出发

                // 判断相对位置，决定线从哪边出，从哪边入
                if (tRect.x + tRect.w / 2 > sRect.x + sRect.w / 2) {
                    // 目标在右
                    sX = sRect.x + sRect.w; sY = sRect.y + headOffset;
                    tX = tRect.x; tY = tRect.y + headOffset;
                    cp1X = sX + Math.max(40, (tX - sX) / 2); cp1Y = sY; cp2X = tX - Math.max(40, (tX - sX) / 2); cp2Y = tY;
                } else {
                    // 目标在左
                    sX = sRect.x; sY = sRect.y + headOffset;
                    tX = tRect.x + tRect.w; tY = tRect.y + headOffset;
                    cp1X = sX - Math.max(40, (sX - tX) / 2); cp1Y = sY; cp2X = tX + Math.max(40, (sX - tX) / 2); cp2Y = tY;
                }

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M ${sX} ${sY} C ${cp1X} ${cp1Y}, ${cp2X} ${cp2Y}, ${tX} ${tY}`);
                path.setAttribute('class', 'edge');
                path.setAttribute('marker-end', 'url(#arrow-right)');
                DOM.edgesLayer.appendChild(path);
            }
        });
    }

    /* 智能排版逻辑：寻找安全空间 (优先左侧，其次右侧) */
    function smartPosition(parentId, targetWidth) {
        const parentNode = state.nodes.find(n => n.id === parentId);
        const gapX = 80; const gapY = 20;
        
        // 尝试左侧
        let testX = parentNode.x - targetWidth - gapX; let testY = parentNode.y;
        if (isSafePos(testX, testY, targetWidth, 200)) return { x: testX, y: testY, dir: 'left' };

        // 尝试右侧
        testX = parentNode.x + parentNode.width + gapX; testY = parentNode.y;
        while (!isSafePos(testX, testY, targetWidth, 200)) testY += 150; // 向下寻找
        return { x: testX, y: testY, dir: 'right' };
    }

    function isSafePos(x, y, w, h) {
        for(let n of state.nodes) {
            if (x < n.x + n.width && x + w > n.x && y < n.y + 200 && y + h > n.y) return false;
        }
        return true;
    }

    /* 进度 Toast 队列系统 */
    function showProgressToast(text) {
        const id = 'toast-' + state.toastIdCount++;
        const toast = document.createElement('div');
        toast.className = 'toast-card'; toast.id = id;
        toast.innerHTML = `<span class="material-symbols-outlined spinner">progress_activity</span><span class="material-symbols-outlined icon-done">check_circle</span><span class="toast-text">${text}</span>`;
        DOM.toastContainer.appendChild(toast);
        return id;
    }
    function updateToast(id, text, done=false) {
        const toast = document.getElementById(id); if(!toast) return;
        toast.querySelector('.toast-text').innerText = text;
        if(done) { toast.classList.add('done'); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000); }
    }

    /* LLM 生成逻辑 */
    function triggerLLM() {
        if (!state.currentSelection.parentNodeId) return;
        
        const parentId = state.currentSelection.parentNodeId;
        const prompt = DOM.promptInput.value || "请扩展详细信息";
        const range = state.currentSelection.range;
        const newNodeId = 'node-' + Date.now();
        const currentColor = state.colorIndex;
        state.colorIndex = (state.colorIndex + 1) % 5;

        hideTooltip(); 
        
        // 如果在全屏里生成，我们需要确保在原始DOM里也加上高亮
        try {
            const mark = document.createElement('mark'); mark.className = 'annotated';
            mark.setAttribute('data-ref-id', newNodeId); mark.style.backgroundColor = `var(--hl-${currentColor}-bg)`; mark.style.color = `var(--hl-${currentColor}-fg)`;
            range.surroundContents(mark);
            
            // 如果处于全屏，同步回源节点
            if (DOM.fsOverlay.classList.contains('active')) {
                const sourceDOM = document.getElementById(parentId).querySelector('.node-content');
                sourceDOM.innerHTML = DOM.fsContent.innerHTML;
            }
        } catch(e) {}
        window.getSelection().removeAllRanges();

        // 智能定位
        const targetWidth = 360;
        const posInfo = smartPosition(parentId, targetWidth);

        addNode({ 
            id: newNodeId, title: 'AI 分析中...', content: '提取上下文中...', 
            x: posInfo.x, y: posInfo.y, width: targetWidth, parentId: parentId, 
            colorIndex: currentColor, dir: posInfo.dir 
        });
        
        const tempEl = document.getElementById(newNodeId); tempEl.classList.add('loading');
        
        // 模拟多阶段进度条
        const toastId = showProgressToast("加入生成队列...");
        
        setTimeout(() => {
            updateToast(toastId, `正在根据 "${prompt}" 检索知识库...`);
            tempEl.querySelector('.node-content').innerHTML = `正在分析原文档结构...\n参数: ${prompt}`;
        }, 800);

        setTimeout(() => {
            updateToast(toastId, "大模型生成中...");
        }, 1600);

        setTimeout(() => {
            tempEl.classList.remove('loading');
            tempEl.querySelector('.node-title-group').innerHTML = `<span class="material-symbols-outlined">auto_awesome</span>扩展批注`;
            
            const aiResponse = `这是一个由 AI 生成的扩展节点。\n\n你可以注意到：\n1. 卡片的颜色条指示器（左或右）会自动适配连线方向，呼应高亮区域。\n2. 如果你把节点拖长，文字会自动展开。\n\n针对你的提示词 "${prompt}"，我认为这里可以补充更多的背景逻辑... 这是一个长文本测试 这是一个长文本测试 这是一个长文本测试 这是一个长文本测试 这是一个长文本测试 这是一个长文本测试 这是一个长文本测试。`;

            tempEl.querySelector('.node-content').innerHTML = aiResponse;
            const nodeData = state.nodes.find(n => n.id === newNodeId);
            nodeData.title = "扩展批注"; nodeData.content = aiResponse;
            
            checkNodeExpansion(tempEl); updateMinimap();
            updateToast(toastId, "节点生成完成", true);
        }, 2800);
    }

    function updateMinimap() {
        if(state.nodes.length === 0) return;
        DOM.minimapContent.innerHTML = '';
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        state.nodes.forEach(n => { minX = Math.min(minX, n.x); minY = Math.min(minY, n.y); maxX = Math.max(maxX, n.x + n.width); maxY = Math.max(maxY, n.y + 150); });
        
        const padding = 500; minX -= padding; minY -= padding; maxX += padding; maxY += padding;
        const mapScale = Math.min(160 / (maxX - minX), 120 / (maxY - minY));

        state.nodes.forEach(n => {
            const div = document.createElement('div'); div.className = 'minimap-node';
            if(n.colorIndex >= 0) div.style.backgroundColor = `var(--hl-${n.colorIndex}-bg)`;
            div.style.left = `${(n.x - minX) * mapScale}px`; div.style.top = `${(n.y - minY) * mapScale}px`;
            div.style.width = `${n.width * mapScale}px`; div.style.height = `${120 * mapScale}px`;
            DOM.minimapContent.appendChild(div);
        });

        const vpX = (-state.canvas.x - minX * state.canvas.scale) * (mapScale / state.canvas.scale);
        const vpY = (-state.canvas.y - minY * state.canvas.scale) * (mapScale / state.canvas.scale);
        DOM.minimapViewport.style.left = `${vpX}px`; DOM.minimapViewport.style.top = `${vpY}px`;
        DOM.minimapViewport.style.width = `${(window.innerWidth / state.canvas.scale) * mapScale}px`; 
        DOM.minimapViewport.style.height = `${(window.innerHeight / state.canvas.scale) * mapScale}px`;
    }

    init();
</script>
</body>
</html>
